services:
  - type: web
    name: seeta
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install && cd frontend && npm install && cd .. && npm run build:frontend
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: REDIS_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MONEI_API_KEY
        sync: false
      - key: MONEI_WEBHOOK_SECRET
        sync: false
